    <h1>Chi Siamo?</h1>
    <p>
        Siamo i maghi del cuscino, i re della pigrizia,<br>
        se cerchi energia, qui trovi solo letargia.<br>
        Esperti di sbadigli, campioni di divano,<br>
        la sveglia ci odia, e noi le diamo la mano.
    </p>
